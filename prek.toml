[[repos]]
repo = "builtin"
hooks = [
  { id = "end-of-file-fixer" },
  { id = "trailing-whitespace" },
]

[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.15.6"

[[repos.hooks]]
id = "ruff-check"
args = [
  # "--fix", "--show-fixes",
  "--config", "backend/pyproject.toml"
]
files = '^backend'
