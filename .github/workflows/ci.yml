name: CI
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend:
    name: backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v6

      - name: "Set up Python"
        uses: actions/setup-python@v6
        with:
          python-version-file: "backend/.python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install the project
        run: uv sync --locked --all-extras --dev

      - name: Lint with ruff
        run: uv run ruff check --output-format github # maybe use: astral-sh/ruff-action in the future

      - name: Type check with ty
        run: uv run ty check --output-format github

      # - name: Run tests
      #   run: uv run pytest


  frontend:
    name: frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: "frontend/package.json" # maybe get pnpm to manage node with devEngines in future

      - uses: actions/setup-node@v6
        with:
          node-version-file: "frontend/package.json"

      - name: Install dependencies
        run: pnpm install

      - name: Run tests
        run: pnpm tsc -b --noEmit

      # - name: Lint with ESLint
      #   run: pnpm run lint
